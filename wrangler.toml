name = "frankgrant-worker"
main = "workers/api.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "frankgrant-db"
database_id = "728339df-7875-4fb7-a58b-196cd8099e22"

[[kv_namespaces]]
binding = "KV"
id = "9c6b57ffb4b8435aa323195d39b4b732"

[dev]
port = 8787

# Secrets to set via: wrangler secret put SECRET_NAME
# - ANTHROPIC_API_KEY        ✅ Set
# - CLERK_SECRET_KEY         ✅ Set
# - STRIPE_SECRET_KEY        (optional, for payments)
# - STRIPE_WEBHOOK_SECRET    (optional, for payments)
# Note: Using JWKS for JWT verification (no PEM key needed)
